version: 0.9.0
inputs:
  files:
    - Snakefile
    - patch_forest.py
    - plot_forest.py
  parameters:
    events: 10
workflow:
  compute_backend: htcondorcern
  htcondor_max_runtime: espresso
  kerberos: true
  type: snakemake
  file: Snakefile
  
  
outputs:
  files:
    - res/HiForest.root
    - res/plots/pfcand_pt.png
    - res/plots/pfcand_eta.png
    - res/plots/pfcand_phi.png
    - res/plots/pfcand_etaphi.png
